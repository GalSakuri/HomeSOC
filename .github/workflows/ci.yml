name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest tests/ -v

  schemathesis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install schemathesis

      - name: Start backend
        run: |
          PYTHONPATH=. python -m uvicorn backend.main:app --host 0.0.0.0 --port 8443 &
          until curl -sf http://localhost:8443/health; do sleep 1; done

      - name: Run Schemathesis
        run: |
          schemathesis run http://localhost:8443/openapi.json --checks not_a_server_error
