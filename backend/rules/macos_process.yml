rules:
  - id: "macos-suspicious-shell-spawn"
    name: "Suspicious Shell Spawned by Non-Terminal Process"
    description: "Shell (bash/zsh/sh) spawned from a non-terminal parent process"
    alert_on: "bash, zsh, or sh is launched by a process that is not a known terminal app. This is a common sign of script injection, exploitation, or malware running commands on your system."
    severity: "high"
    platform: "macos"
    type: "single"
    conditions:
      category: "process"
      event_type: "process_exec"
      match_any:
        process_name: ["bash", "zsh", "sh"]
      not_match_prefix:
        process_path:
          - "/Applications/iTerm.app/"
          - "/System/Applications/Utilities/Terminal.app/"
          - "/Applications/Visual Studio Code.app/"
          - "/Applications/Alacritty.app/"

  - id: "macos-exec-from-tmp"
    name: "Process Executing from Temporary Directory"
    description: "Binary executed from /tmp, /var/tmp, or Downloads"
    alert_on: "A binary runs directly from /tmp, /var/tmp, or Downloads. Legitimate software rarely executes from these locations — attackers commonly stage and run malware here."
    severity: "medium"
    platform: "macos"
    type: "single"
    conditions:
      category: "process"
      event_type: "process_exec"
      match_any_prefix:
        process_path: ["/tmp/", "/var/tmp/", "/Users/*/Downloads/"]

  - id: "macos-suspicious-tool"
    name: "Suspicious Reconnaissance Tool Executed"
    description: "Network scanning or data exfiltration tool detected"
    alert_on: "A known network scanning or exfiltration tool is executed (nmap, netcat, tcpdump, socat, etc.). These tools are rarely needed on a home machine and may indicate active reconnaissance."
    severity: "high"
    platform: "macos"
    type: "single"
    conditions:
      category: "process"
      event_type: "process_exec"
      match_any:
        process_name: ["nmap", "nc", "netcat", "ncat", "socat", "tcpdump"]

  - id: "macos-launch-daemon-created"
    name: "New LaunchDaemon or LaunchAgent Registered"
    description: "File created in LaunchDaemons/LaunchAgents — potential persistence mechanism"
    alert_on: "A new file is written to the LaunchDaemons or LaunchAgents folders. macOS uses these to auto-start programs at boot or login — malware often installs here to survive restarts."
    severity: "high"
    platform: "macos"
    type: "single"
    conditions:
      category: "file"
      event_type: "file_create"
      match_any_contains:
        file_path: ["LaunchDaemons", "LaunchAgents"]
