rules:
  - id: "macos-unusual-outbound"
    name: "Outbound Connection on Uncommon Port"
    description: "Process connecting to external IP on non-standard port"
    alert_on: "A process makes an outbound internet connection on a port not used by common services (HTTP, HTTPS, DNS, SSH, etc.). Could indicate a backdoor, malware C2, or a misconfigured app."
    severity: "medium"
    platform: "macos"
    type: "single"
    conditions:
      category: "network"
      event_type: "network_connection"
      not_match:
        dst_port: [80, 443, 53, 22, 993, 587, 5353, 8080, 8443]
      not_match_prefix:
        dst_ip:
          - "192.168."
          - "10."
          - "172.16."
          - "172.17."
          - "172.18."
          - "172.19."
          - "172.20."
          - "172.21."
          - "172.22."
          - "172.23."
          - "172.24."
          - "172.25."
          - "172.26."
          - "172.27."
          - "172.28."
          - "172.29."
          - "172.30."
          - "172.31."
          - "127."
          - "::1"
          - "fe80:"

  - id: "macos-known-c2-port"
    name: "Connection to Known C2 Port"
    description: "Outbound connection to port commonly used by C2 frameworks"
    alert_on: "Any outbound connection is made to a port associated with attacker command-and-control frameworks (4444, 1337, 31337, etc.). This is a strong indicator of active malware communication."
    severity: "critical"
    platform: "macos"
    type: "single"
    conditions:
      category: "network"
      event_type: "network_connection"
      match_any:
        dst_port: [4444, 1337, 6667, 5555, 9001, 8888, 31337]

  - id: "macos-brute-force-auth"
    name: "Multiple Failed Authentication Attempts"
    description: "More than 5 failed auth attempts within 60 seconds"
    alert_on: "More than 5 failed login attempts occur within 60 seconds. This pattern typically indicates an automated brute-force or password-guessing attack against your machine."
    severity: "critical"
    platform: "macos"
    type: "threshold"
    conditions:
      category: "auth"
      event_type: "auth_attempt"
      match:
        auth_success: false
    window_seconds: 60
    threshold: 5
